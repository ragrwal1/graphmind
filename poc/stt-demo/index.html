<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>STT POC</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #f7f7f4;
        color: #1c1d1f;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(560px, calc(100vw - 32px));
      }

      button {
        border: 1px solid #222;
        background: #1c1d1f;
        color: white;
        border-radius: 6px;
        cursor: pointer;
        font: inherit;
        padding: 10px 14px;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }

      .row {
        align-items: center;
        display: flex;
        gap: 10px;
        margin: 16px 0;
      }

      .status {
        color: #5c6066;
        min-height: 24px;
      }

      pre {
        background: white;
        border: 1px solid #d9d9d2;
        border-radius: 6px;
        min-height: 180px;
        overflow: auto;
        padding: 16px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>STT POC</h1>
      <div class="row">
        <button id="recordButton">Record</button>
        <button id="stopButton" disabled>Stop</button>
      </div>
      <div id="status" class="status">Ready.</div>
      <pre id="output">{}</pre>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
